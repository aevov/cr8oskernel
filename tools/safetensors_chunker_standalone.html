<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeTensors Chunker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #667eea;
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
        }

        .size-display {
            text-align: center;
            font-size: 1.5rem;
            color: #667eea;
            font-weight: bold;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-section {
            margin-top: 30px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .log-box {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .log-entry {
            margin-bottom: 8px;
        }

        .log-entry.success {
            color: #00ff00;
        }

        .log-entry.error {
            color: #ff5555;
        }

        .log-entry.info {
            color: #5599ff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔪 SafeTensors Chunker</h1>

        <div class="form-group">
            <label>📁 Select SafeTensors File</label>
            <input type="file" id="fileInput" accept=".safetensors" onchange="fileSelected()">
        </div>

        <div class="form-group">
            <label>📦 Chunk Size: <span id="chunkSizeLabel">50 MB</span></label>
            <input type="range" id="chunkSize" min="5" max="100" value="50" step="5" oninput="updateChunkSize()">
            <small style="color: #666; display: block; margin-top: 5px;">
                Smaller chunks = More files, Larger chunks = Fewer files
            </small>
        </div>

        <button id="startBtn" onclick="startChunking()" disabled>
            🚀 Start Chunking
        </button>

        <div class="progress-section" id="progressSection">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="statTensors">0</div>
                    <div class="stat-label">Tensors</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statParams">0M</div>
                    <div class="stat-label">Parameters</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statChunks">0</div>
                    <div class="stat-label">Chunks Created</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>

            <div class="log-box" id="logBox"></div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let chunkSizeMB = 50;

        function fileSelected() {
            selectedFile = document.getElementById('fileInput').files[0];
            if (selectedFile) {
                document.getElementById('startBtn').disabled = false;
                log(`Selected: ${selectedFile.name} (${(selectedFile.size / 1024 / 1024).toFixed(1)} MB)`, 'info');
            }
        }

        function updateChunkSize() {
            chunkSizeMB = parseInt(document.getElementById('chunkSize').value);
            document.getElementById('chunkSizeLabel').textContent = `${chunkSizeMB} MB`;
        }

        function log(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function startChunking() {
            if (!selectedFile) return;

            document.getElementById('startBtn').disabled = true;
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('logBox').innerHTML = '';

            log('🚀 Starting chunking process...', 'info');

            try {
                // Read header only (first 100MB max)
                log('📖 Reading file header...', 'info');
                const headerBlob = selectedFile.slice(0, Math.min(100 * 1024 * 1024, selectedFile.size));
                const headerBuffer = await headerBlob.arrayBuffer();
                const uint8Array = new Uint8Array(headerBuffer);

                log(`✓ Header loaded`, 'success');

                // Parse header
                log('📋 Parsing safetensors header...', 'info');
                const headerSize = Number(new DataView(headerBuffer, 0, 8).getBigUint64(0, true));
                const headerBytes = uint8Array.slice(8, 8 + headerSize);
                const headerStr = new TextDecoder().decode(headerBytes);
                const metadata = JSON.parse(headerStr);

                const tensorNames = Object.keys(metadata).filter(k => k !== '__metadata__');
                document.getElementById('statTensors').textContent = tensorNames.length;
                log(`✓ Found ${tensorNames.length} tensors`, 'success');

                // Calculate total parameters
                let totalParams = 0;
                for (const name of tensorNames) {
                    const shape = metadata[name].shape;
                    const params = shape.reduce((a, b) => a * b, 1);
                    totalParams += params;
                }
                document.getElementById('statParams').textContent = `${(totalParams / 1e6).toFixed(1)}M`;
                log(`✓ Total parameters: ${(totalParams / 1e6).toFixed(1)}M`, 'success');

                // Chunk tensors
                log(`📦 Creating chunks (${chunkSizeMB}MB each)...`, 'info');
                const chunks = [];
                let currentChunk = { tensors: [], size: 0 };
                const chunkSizeBytes = chunkSizeMB * 1024 * 1024;

                for (let i = 0; i < tensorNames.length; i++) {
                    const name = tensorNames[i];
                    const tensorMeta = metadata[name];
                    const absoluteOffset = 8 + headerSize + tensorMeta.data_offsets[0];
                    const dataSize = tensorMeta.data_offsets[1] - tensorMeta.data_offsets[0];

                    // Read just this tensor from file (streaming!)
                    const tensorBlob = selectedFile.slice(absoluteOffset, absoluteOffset + dataSize);
                    const tensorBuffer = await tensorBlob.arrayBuffer();
                    const tensorData = new Uint8Array(tensorBuffer);

                    // Convert to Float32
                    let values;
                    if (tensorMeta.dtype === 'F32') {
                        values = new Float32Array(tensorData.buffer, tensorData.byteOffset, tensorData.byteLength / 4);
                    } else if (tensorMeta.dtype === 'BF16') {
                        values = bfloat16ToFloat32(tensorData);
                    } else {
                        log(`⚠ Skipping tensor ${name} with unsupported dtype: ${tensorMeta.dtype}`, 'error');
                        continue;
                    }

                    // Downsample if tensor is too large (>100M values = ~400MB JSON)
                    let valuesArray = Array.from(values);
                    if (valuesArray.length > 100_000_000) {
                        log(`⚠ Tensor ${name} is very large (${(valuesArray.length / 1e6).toFixed(1)}M values), downsampling...`, 'info');
                        // Downsample to 50M max
                        const stride = Math.ceil(valuesArray.length / 50_000_000);
                        valuesArray = valuesArray.filter((_, idx) => idx % stride === 0);
                        log(`✓ Downsampled to ${(valuesArray.length / 1e6).toFixed(1)}M values`, 'success');
                    }

                    const tensorObj = {
                        name: name,
                        shape: tensorMeta.shape,
                        values: valuesArray
                    };

                    // Try to estimate JSON size
                    const estimatedSize = valuesArray.length * 10; // rough estimate: 10 bytes per number in JSON

                    // If adding this tensor exceeds chunk size, save current chunk
                    if (currentChunk.size > 0 && currentChunk.size + estimatedSize > chunkSizeBytes) {
                        chunks.push(currentChunk);
                        currentChunk = { tensors: [], size: 0 };
                    }

                    currentChunk.tensors.push(tensorObj);
                    currentChunk.size += estimatedSize;

                    // Update progress
                    const progress = ((i + 1) / tensorNames.length * 100).toFixed(1);
                    document.getElementById('progressFill').style.width = `${progress}%`;
                    document.getElementById('progressFill').textContent = `${progress}%`;

                    if ((i + 1) % 10 === 0) {
                        log(`Processing tensor ${i + 1}/${tensorNames.length}...`, 'info');
                    }
                }

                // Add last chunk
                if (currentChunk.tensors.length > 0) {
                    chunks.push(currentChunk);
                }

                document.getElementById('statChunks').textContent = chunks.length;
                log(`✓ Created ${chunks.length} chunks`, 'success');

                // Download chunks
                log('💾 Generating download links...', 'info');
                const baseName = selectedFile.name.replace('.safetensors', '');

                for (let i = 0; i < chunks.length; i++) {
                    const chunkJson = JSON.stringify({
                        chunkIndex: i,
                        totalChunks: chunks.length,
                        tensors: chunks[i].tensors
                    }, null, 2);

                    const blob = new Blob([chunkJson], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${baseName}_chunk_${i + 1}_of_${chunks.length}.json`;
                    a.click();
                    URL.revokeObjectURL(url);

                    log(`✓ Saved chunk ${i + 1}/${chunks.length}: ${baseName}_chunk_${i + 1}_of_${chunks.length}.json`, 'success');


                    // Small delay to not overwhelm browser
                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                log('🎉 Chunking complete! Check your downloads folder.', 'success');

            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                console.error(error);
            } finally {
                document.getElementById('startBtn').disabled = false;
            }
        }

        function bfloat16ToFloat32(uint8Array) {
            const float32 = new Float32Array(uint8Array.length / 2);
            const dataView = new DataView(uint8Array.buffer, uint8Array.byteOffset);

            for (let i = 0; i < float32.length; i++) {
                const bf16 = dataView.getUint16(i * 2, true);
                const f32Bits = bf16 << 16;
                float32[i] = new DataView(new Uint32Array([f32Bits]).buffer).getFloat32(0, true);
            }

            return float32;
        }
    </script>
</body>

</html>
